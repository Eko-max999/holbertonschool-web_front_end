<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Styleguide - Techium</title>
</head>
<body>
    <main>
        <section><h2>Headings</h2></section>
        <section><h2>Lists</h2></section>
        <section><h2>Tables</h2></section>
        <section><header><h2>Blockquotes</h2></header></section>
        <section><header><h2>Typography</h2></header></section>
        
        <section>
            <header><h2>Details</h2></header>
            <div>
                <h3>Default</h3>
                <details>
                    <summary>Show/Hide me</summary>
                    <p>Pellentesque habitant morbi tristique senectus et netus et malesuada fames ac turpis egestas.</p>
                </details>
            </div>
            <div>
                <h3>Open</h3>
                <details open>
                    <summary>Always open</summary>
                    <p>Pellentesque habitant morbi tristique senectus et netus et malesuada fames ac turpis egestas.</p>
                </details>
            </div>
        </section>

        <section>
            <header>
                <h2>Video</h2>
            </header>
            <video src="https://intranet-projects-files.s3.amazonaws.com/webstack/BigBuckBunny.mp4" controls loop poster="https://intranet-projects-files.s3.amazonaws.com/webstack/thumbnail.jpg">
                Sorry, your browser doesn't support HTML5 video
            </video>
        </section>
    </main>
</body>
</html>
